# =============================================================================
# Cấu hình mặc định cho pipeline OCR-IDP.
# Ghi đè bằng: file YAML khác (truyền --config) hoặc biến môi trường OCRIDP_*.
# =============================================================================

# Thư mục dữ liệu gốc (raw/processed/ground_truth/synthetic/splits)
data_dir: data
# Thư mục lưu artifacts trung gian để debug (ảnh tiền xử lý, OCR overlay, JSON...)
output_dir: outputs
log_level: INFO

# --- [1] Tiền xử lý tài liệu -------------------------------------------------
preprocess:
  target_dpi: 300          # DPI khi render PDF -> ảnh
  max_side: 2500           # giới hạn cạnh dài nhất (px) để OCR ổn định/nhanh
  deskew: true             # tự phát hiện & xoay thẳng trang
  denoise: true            # khử nhiễu
  enhance_contrast: true   # tăng tương phản (CLAHE)
  # none = giữ ảnh xám (tốt nhất cho OCR học sâu RapidOCR/VietOCR).
  # otsu/adaptive/sauvola: hữu ích cho Tesseract hoặc ảnh nền bẩn.
  binarize: none           # none | otsu | adaptive | sauvola
  auto_crop: true          # cắt viền/khoảng trắng quanh vùng nội dung
  # Phát hiện PDF có text-layer: nếu trang có >= ngưỡng ký tự thì bỏ OCR
  text_layer_min_chars: 50

# --- [2] OCR -----------------------------------------------------------------
ocr:
  # rapidocr: nhẹ, chạy mọi nơi, tốt cho mã/số/ngày nhưng YẾU dấu tiếng Việt.
  # vietocr : RapidOCR(phát hiện) + VietOCR(nhận dạng) -> GIỮ DẤU tốt; cần torch
  #           (chạy trong Docker). Khuyến nghị cho ảnh scan tiếng Việt.
  engine: rapidocr         # rapidocr | vietocr | paddle | easyocr | tesseract
  lang: vi
  use_gpu: false
  vietocr_model: vgg_transformer
  # Ngưỡng confidence tối thiểu để giữ 1 dòng/từ OCR (0..1)
  min_text_confidence: 0.3

# --- [4] Trích xuất trường ---------------------------------------------------
extraction:
  default_strategy: anchor # rule | anchor | layout | llm
  anchor:
    fuzzy_threshold: 80     # ngưỡng fuzzy match nhãn (0..100, rapidfuzz)
  llm:
    enabled: false          # mặc định TẮT; bật để LLM sửa/bổ sung trường (cần ANTHROPIC_API_KEY)
    model: claude-opus-4-8  # model mạnh nhất (xác nhận id qua tài liệu claude-api)
    max_tokens: 2048
    repair: true            # khi enabled: dùng LLM sửa trường thiếu/độ tin cậy thấp (vd sửa lỗi dấu của OCR scan)
    api_key_env: ANTHROPIC_API_KEY
    # KHÔNG đặt temperature/budget_tokens: Opus 4.8/4.7 trả 400 với các tham số này.

# --- [5] Chuẩn hóa & kiểm tra ------------------------------------------------
validation:
  min_confidence: 0.6      # dưới ngưỡng -> gắn cờ cần người kiểm tra
  date_output_format: "%Y-%m-%d"
