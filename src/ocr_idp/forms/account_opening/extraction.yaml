# =============================================================================
# Cấu hình trích xuất Form A — Giấy đề nghị mở tài khoản GDCK (cá nhân).
# Mỗi field: name (dot-path vào JSON) + strategy + tham số.
#   strategy: anchor | rule | checkbox(M5) | signature(M5)
# =============================================================================
fields:
  # --- Thông tin nhà đầu tư (anchor theo nhãn) ---
  - name: investor.full_name
    strategy: anchor
    anchor: ["Họ và tên", "Họ tên"]
    normalizer: string
    required: true

  - name: investor.date_of_birth
    strategy: anchor
    anchor: ["Ngày sinh"]
    normalizer: date

  - name: investor.gender
    strategy: anchor
    anchor: ["Giới tính"]
    choices: ["Nam", "Nữ"]

  - name: investor.nationality
    strategy: anchor
    anchor: ["Quốc tịch"]
    normalizer: string

  - name: investor.id_document.type
    strategy: anchor
    anchor: ["Loại giấy tờ"]
    choices: ["CCCD", "CMND", "Hộ chiếu"]

  - name: investor.id_document.number
    strategy: anchor
    anchor: ["Số"]                     # fuzz.ratio phân biệt với "Số tài khoản"
    normalizer: id_number
    required: true

  - name: investor.id_document.issue_date
    strategy: anchor
    anchor: ["Ngày cấp"]
    normalizer: date

  - name: investor.id_document.issue_place
    strategy: anchor
    anchor: ["Nơi cấp"]
    normalizer: string

  - name: investor.permanent_address
    strategy: anchor
    anchor: ["Địa chỉ thường trú", "Địa chỉ"]
    normalizer: string

  - name: investor.phone
    strategy: anchor
    anchor: ["Điện thoại"]
    normalizer: phone

  - name: investor.email
    strategy: anchor
    anchor: ["Email"]
    normalizer: email

  # --- Thông tin tài khoản ---
  - name: account.account_number
    strategy: anchor
    anchor: ["Số tài khoản"]
    normalizer: account_number

  - name: account.account_types         # checkbox -> M5
    strategy: checkbox
    options:
      thường: "Thường"
      ký quỹ: "Ký quỹ"

  - name: account.services              # checkbox -> M5
    strategy: checkbox
    options:
      online: "Online"
      sms: "SMS"
      email: "Email"

  # --- Ngày đăng ký (không có nhãn cố định -> regex 'ngày..tháng..năm') ---
  - name: registration_date
    strategy: rule
    regex: 'ngay\s+\d{1,2}\s+thang\s+\d{1,2}\s+nam\s+\d{4}'
    normalizer: date

  # --- Chữ ký (cần phát hiện vùng -> M5) ---
  - name: signature_present
    strategy: signature
