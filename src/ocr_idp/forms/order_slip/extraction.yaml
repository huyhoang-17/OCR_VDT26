# =============================================================================
# Cấu hình trích xuất Form B — Phiếu lệnh giao dịch.
#   strategy: anchor | radio (chọn 1) | rule
# Radio dùng phát hiện ô (M5) trên ảnh trang -> key = giá trị enum trong schema.
# =============================================================================
fields:
  - name: account_number
    strategy: anchor
    anchor: ["Số tài khoản"]
    normalizer: account_number
    required: true

  - name: investor_name
    strategy: anchor
    anchor: ["Tên NĐT", "Tên nhà đầu tư", "Tên NDT"]
    normalizer: string

  - name: exchange
    strategy: radio
    options: { HOSE: "HOSE", HNX: "HNX", UPCOM: "UPCOM" }

  - name: side
    strategy: radio
    options: { MUA: "MUA", BÁN: "BÁN" }
    required: true

  - name: security_symbol
    strategy: anchor
    anchor: ["Mã CK", "Mã chứng khoán"]
    normalizer: symbol
    required: true

  - name: order_type
    strategy: radio
    options: { LO: "LO", ATO: "ATO", ATC: "ATC", MP: "MP", MTL: "MTL" }

  - name: quantity
    strategy: anchor
    anchor: ["Khối lượng", "Khối lượng đặt"]
    normalizer: int
    required: true

  - name: price
    strategy: anchor
    anchor: ["Giá"]
    normalizer: price

  - name: order_datetime
    strategy: anchor
    anchor: ["Thời gian"]
    normalizer: datetime

  - name: channel
    strategy: radio
    options: { Quầy: "Quầy", Online: "Online", Điện thoại: "Điện thoại" }
