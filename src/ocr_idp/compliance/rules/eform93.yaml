rules:
  - id: eform93.org_investor_count
    title: Số nhà đầu tư tổ chức trong nước cộng nước ngoài bằng tổng
    severity: error
    operation: sum_equals
    total: org_total
    parts: [org_domestic, org_foreign]
    null_as_zero: true
    message: Tổng số nhà đầu tư tổ chức không khớp các cấu phần.
  - id: eform93.org_unit_count
    title: Chứng chỉ quỹ tổ chức trong nước cộng nước ngoài bằng tổng
    severity: error
    operation: sum_equals
    total: org_units_total
    parts: [org_units_domestic, org_units_foreign]
    null_as_zero: true
    message: Tổng chứng chỉ quỹ của tổ chức không khớp các cấu phần.
  - id: eform93.org_ratio
    title: Tỷ lệ góp vốn tổ chức trong nước cộng nước ngoài bằng tổng
    severity: error
    operation: sum_equals
    total: org_ratio_total
    parts: [org_ratio_domestic, org_ratio_foreign]
    null_as_zero: true
    absolute_tolerance: 0.01
    message: Tổng tỷ lệ góp vốn của tổ chức không khớp các cấu phần.
