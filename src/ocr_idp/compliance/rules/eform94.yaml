  par_value: MenhgiaCCquyzzValue
  additional_raised: VonhuydongthemzzValue
  additional_units: SLCCquycophanphathanhthemzzValue
  issue_price: GiaphathanhcuamotCCquycophanzzValue
  post_capital: VondieulequytruocsauthaydoizzValue
  post_units: SLCCquycophanluuhanhsaukhithaydoizzValue
  acquired_capital: VondieulecuacongtybisapnhapzzValue
  acquired_units: SLCCquycophandangluuhanhcuacongtybisapnhapzzValue
